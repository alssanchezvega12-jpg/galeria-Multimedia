<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🎨 Mi Galería Multimedia</title>
  <link rel="stylesheet" href="style.css">
  <!-- El ./ busca el archivo directamente en tu carpeta local -->
  <script src="./script.js" defer></script>
</head>
<body>

  <h1>📂 Mi Galería Multimedia</h1>

  <!-- Formulario para crear elementos -->
  <form id="multimediaForm" enctype="multipart/form-data">
    <input type="text" name="titulo" placeholder="Título" required>
    <textarea name="descripcion" placeholder="Descripción"></textarea>
    <input type="file" name="imagen" accept="image/*" required>
    <input type="file" name="audio" accept="audio/*" required>
    <input type="text" name="tags" placeholder="Tags (ej: música,paisaje,revolucionario)">
    <button type="submit" id="btnCrear">➕ Crear</button>
  </form>

  <!-- Botones CRUD globales (Piden exclusivamente NOMBRE, no ID) -->
  <div class="crud-buttons">
    <button onclick="cargarElementos()">👁️ Leer Todo</button>
    <button onclick="solicitarNombreParaEditar()">✏️ Actualizar por Nombre</button>
    <button onclick="solicitarNombreParaEliminar()">🗑️ Eliminar por Nombre</button>
  </div>

  <!-- Contenedor donde se cargarán tus tarjetas multimedia -->
  <div id="lista"></div>

</body>
</html>

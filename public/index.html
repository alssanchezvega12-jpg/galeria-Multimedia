<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🎨 Mi Galería Multimedia</title>
  <link rel="stylesheet" href="style.css">
  <!-- CORRECCIÓN: Etiqueta script bien cerrada y apuntando a tu archivo de lógica local -->
  <script src="script.js" defer></script>
</head>
<body>
  <h1>📂 Mi Galería Multimedia</h1>

  <!-- Formulario -->
  <form id="multimediaForm" enctype="multipart/form-data">
    <input type="text" name="titulo" placeholder="Título" required>
    <textarea name="descripcion" placeholder="Descripción"></textarea>
    <input type="file" name="imagen" accept="image/*" required>
    <input type="file" name="audio" accept="audio/*" required>
    <input type="text" name="tags" placeholder="Tags (ej: música,paisaje,revolucionario)">
    <button type="submit" id="btnCrear">➕ Crear</button>
  </form>

  <!-- Botones CRUD globales -->
  <div class="crud-buttons">
    <button onclick="cargarElementos()">👁️ Leer</button>
    <button onclick="editarElemento(prompt('Nombre del elemento a editar:'))">✏️ Actualizar</button>
    <button onclick="eliminarElemento(prompt('Nombre del elemento a eliminar:'))">🗑️ Eliminar</button>
  </div>
</body>
</html>
